<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Viewer</title>
    <style>
        :root {
            --bg: #f3f5f7;
            --card: #ffffff;
            --line: #e6e9ee;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-soft: #e6f4f1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 0%, #ffffff, var(--bg) 55%);
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-right: auto;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
            align-items: center;
        }

        .file-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #86efac;
            background: #dcfce7;
            color: #166534;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-btn:hover {
            border-color: #4ade80;
            background: #bbf7d0;
        }

        .file-btn input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .search {
            flex: 1;
            min-width: 220px;
            border: 1px solid #cfd6de;
            background: #fff;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        .search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .stats {
            color: var(--muted);
            font-size: 13px;
        }

        .notice {
            margin-bottom: 14px;
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1d4ed8;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .card {
            border: 1px solid var(--line);
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .card-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }

        .id-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #374151;
            font-size: 12px;
            font-weight: 600;
        }

        .card-main {
            display: flex;
            gap: 12px;
            padding: 12px;
            align-items: stretch;
        }

        .thumb-wrap {
            flex: 0 0 220px;
            min-height: 280px;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            background: #f8fafc;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            cursor: zoom-in;
        }

        .thumb-empty {
            color: #9ca3af;
            font-size: 12px;
            text-align: center;
            padding: 8px;
        }

        .texts {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            min-width: 0;
        }

        .text-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
        }

        .text-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: var(--accent-soft);
            border-bottom: 1px solid #d7ebe8;
            padding: 6px 8px 6px 10px;
        }

        .text-title {
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            min-width: 0;
        }

        .copy-btn {
            border: 1px solid #99f6e4;
            background: #ecfeff;
            color: #0f766e;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #ccfbf1;
            border-color: #5eead4;
        }

        .copy-btn:active {
            transform: translateY(1px);
        }

        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, calc(-50% + 10px));
            padding: 12px 20px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.9);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            z-index: 1200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .text-body {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 220px;
            overflow: auto;
            padding: 10px;
            font-size: 13px;
            line-height: 1.55;
            color: #1f2937;
        }

        .muted {
            color: #6b7280;
        }

        .empty {
            padding: 30px 10px;
            text-align: center;
            color: #6b7280;
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            background: #fff;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }

        .modal.show {
            display: flex;
        }

        .modal img {
            max-width: min(92vw, 1200px);
            max-height: 88vh;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: #111;
        }

        @media (max-width: 780px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .card-main {
                grid-template-columns: 1fr;
            }

            .thumb-wrap {
                min-height: clamp(260px, 50vh, 520px);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title">Data Viewer</div>
            <div class="stats" id="stats">请先上传 CSV 文件</div>
        </div>

        <div class="toolbar">
            <label class="file-btn">
                + 选择 CSV 文件
                <input id="csvInput" type="file" accept=".csv,text/csv" />
            </label>
            <input id="searchInput" class="search" placeholder="按 ID 或主题关键词搜索" />
        </div>

        <div id="result"></div>
    </div>

    <div class="modal" id="imgModal">
        <img id="modalImg" alt="preview" />
    </div>
    <div class="toast" id="toast">复制成功</div>

    <script>
        const csvInput = document.getElementById('csvInput');
        const searchInput = document.getElementById('searchInput');
        const result = document.getElementById('result');
        const stats = document.getElementById('stats');
        const imgModal = document.getElementById('imgModal');
        const modalImg = document.getElementById('modalImg');
        const toast = document.getElementById('toast');

        let groups = [];
        let toastTimer = null;

        csvInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            stats.textContent = '正在读取 CSV...';
            result.innerHTML = '<div class="empty">正在解析，请稍候...</div>';

            try {
                const rows = await parseCsvFile(file);
                groups = buildGroups(rows);
                render();
            } catch (err) {
                result.innerHTML = `<div class="empty">CSV 解析失败：${escapeHtml(String(err.message || err))}</div>`;
                stats.textContent = '解析失败';
            }
        });

        searchInput.addEventListener('input', () => {
            render();
        });

        result.addEventListener('click', async (event) => {
            const btn = event.target.closest('.copy-btn');
            if (!btn) {
                return;
            }

            const section = btn.closest('.text-item');
            const body = section ? section.querySelector('.text-body') : null;
            const text = body ? body.textContent : '';

            const ok = await copyText(text);
            showToast(ok ? '复制成功' : '复制失败');
        });

        imgModal.addEventListener('click', () => {
            imgModal.classList.remove('show');
            modalImg.src = '';
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                imgModal.classList.remove('show');
                modalImg.src = '';
            }
        });

        async function parseCsvFile(file) {
            const text = await readTextWithFallback(file);
            const records = parseCsvRecords(text);
            if (records.length < 2) {
                return [];
            }

            const header = records[0].map(x => x.trim().toLowerCase());
            const fileIdx = header.indexOf('file');
            const urlIdx = header.indexOf('url');
            const contentIdx = header.indexOf('content');

            if (fileIdx < 0 || urlIdx < 0) {
                throw new Error('CSV 需要包含 file,url 两列');
            }

            const rows = [];
            for (let i = 1; i < records.length; i++) {
                const cols = records[i];
                const fileCol = (cols[fileIdx] || '').trim();
                const urlCol = (cols[urlIdx] || '').trim();
                if (!fileCol || !urlCol) {
                    continue;
                }
                const contentCol = contentIdx >= 0 ? (cols[contentIdx] || '') : '';
                rows.push({ file: fileCol, url: urlCol, content: contentCol });
            }

            return rows;
        }

        function parseCsvRecords(text) {
            const records = [];
            let row = [];
            let field = '';
            let inQuote = false;
            const src = String(text).replace(/^\uFEFF/, '');

            for (let i = 0; i < src.length; i++) {
                const ch = src[i];
                if (ch === '"') {
                    if (inQuote && src[i + 1] === '"') {
                        field += '"';
                        i++;
                    } else {
                        inQuote = !inQuote;
                    }
                } else if (ch === ',' && !inQuote) {
                    row.push(field);
                    field = '';
                } else if ((ch === '\n' || ch === '\r') && !inQuote) {
                    row.push(field);
                    field = '';

                    const hasContent = row.some(cell => cell !== '');
                    if (hasContent) {
                        records.push(row);
                    }
                    row = [];

                    if (ch === '\r' && src[i + 1] === '\n') {
                        i++;
                    }
                } else {
                    field += ch;
                }
            }

            row.push(field);
            if (row.some(cell => cell !== '')) {
                records.push(row);
            }

            return records;
        }

        function buildGroups(rows) {
            const map = new Map();

            for (const row of rows) {
                const parsed = parseFileName(row.file);
                if (!parsed) {
                    continue;
                }

                if (!map.has(parsed.id)) {
                    map.set(parsed.id, {
                        id: parsed.id,
                        imageUrl: '',
                        imageFile: '',
                        texts: []
                    });
                }

                const group = map.get(parsed.id);
                if (parsed.kind === 'image') {
                    group.imageUrl = row.url;
                    group.imageFile = row.file;
                } else if (parsed.kind === 'text') {
                    group.texts.push({
                        label: parsed.label,
                        url: row.url,
                        file: row.file,
                        content: row.content ? row.content : '未提供 content 列内容'
                    });
                }
            }

            const list = Array.from(map.values());
            list.sort((a, b) => a.id.localeCompare(b.id, 'zh-CN'));

            for (const g of list) {
                g.texts.sort((a, b) => a.label.localeCompare(b.label, 'zh-CN'));
            }

            return list;
        }

        function parseFileName(path) {
            const name = decodePathTail(path);

            const imageMatch = name.match(/^(.*)_0001\.webp$/i);
            if (imageMatch) {
                const id = imageMatch[1];
                return { kind: 'image', id, label: '图片' };
            }

            const textMatch = name.match(/^(.*)_001_(.+)\.txt$/i);
            if (textMatch) {
                const id = textMatch[1];
                const label = textMatch[2];
                return { kind: 'text', id, label };
            }

            return null;
        }

        function decodePathTail(path) {
            const tail = String(path).split('/').pop() || '';
            try {
                return decodeURIComponent(tail);
            } catch (_) {
                return tail;
            }
        }

        async function readTextWithFallback(file) {
            const buffer = await file.arrayBuffer();
            return decodeTextBuffer(buffer);
        }

        function decodeTextBuffer(buffer) {
            const tryOrder = ['utf-8', 'gb18030'];
            for (const enc of tryOrder) {
                try {
                    const text = new TextDecoder(enc, { fatal: false }).decode(buffer);
                    if (looksReasonableText(text)) {
                        return text.replace(/^\uFEFF/, '');
                    }
                } catch (_) {
                    // ignore
                }
            }
            return new TextDecoder('utf-8', { fatal: false }).decode(buffer).replace(/^\uFEFF/, '');
        }

        function looksReasonableText(text) {
            if (!text) {
                return false;
            }
            const bad = (text.match(/�/g) || []).length;
            return bad <= Math.max(1, Math.floor(text.length * 0.01));
        }

        function render() {
            const key = searchInput.value.trim().toLowerCase();

            const filtered = groups.filter((g) => {
                if (!key) {
                    return true;
                }
                if (g.id.toLowerCase().includes(key)) {
                    return true;
                }
                return g.texts.some(t => t.label.toLowerCase().includes(key) || t.file.toLowerCase().includes(key));
            });

            stats.textContent = `共 ${groups.length} 组，当前显示 ${filtered.length} 组`;

            if (groups.length === 0) {
                result.innerHTML = '<div class="empty">请选择 CSV 文件开始浏览</div>';
                return;
            }

            if (filtered.length === 0) {
                result.innerHTML = '<div class="empty">没有匹配结果</div>';
                return;
            }

            const cards = filtered.map(renderCard).join('');
            result.innerHTML = `<div class="grid">${cards}</div>`;

            for (const el of document.querySelectorAll('[data-zoom-src]')) {
                el.addEventListener('click', () => {
                    modalImg.src = el.getAttribute('data-zoom-src');
                    imgModal.classList.add('show');
                });
            }
        }

        function renderCard(group) {
            const imageHtml = group.imageUrl
                ? `<img src="${escapeAttr(group.imageUrl)}" alt="${escapeAttr(group.id)}" data-zoom-src="${escapeAttr(group.imageUrl)}">`
                : '<div class="thumb-empty">无对应图片</div>';

            const textsHtml = group.texts.length
                ? group.texts.map(t => `
                    <section class="text-item">
                        <div class="text-head">
                            <h4 class="text-title">${escapeHtml(t.label)}</h4>
                            <button class="copy-btn" type="button">复制</button>
                        </div>
                        <pre class="text-body">${escapeHtml(t.content)}</pre>
                    </section>
                `).join('')
                : '<div class="muted">无文本内容</div>';

            return `
                <article class="card">
                    <div class="card-head">
                        <span class="id-badge">${escapeHtml(group.id)}</span>
                    </div>
                    <div class="card-main">
                        <div class="thumb-wrap">${imageHtml}</div>
                        <div class="texts">${textsHtml}</div>
                    </div>
                </article>
            `;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttr(text) {
            return escapeHtml(text).replace(/`/g, '&#96;');
        }

        async function copyText(text) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }
            } catch (_) {
                // fallback below
            }

            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.setAttribute('readonly', 'readonly');
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                return ok;
            } catch (_) {
                return false;
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');

            if (toastTimer) {
                clearTimeout(toastTimer);
            }
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 1200);
        }
    </script>
</body>
</html>
